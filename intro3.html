<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPAVE Onboarding - Expenses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="intro3.js" defer></script>
  </head>
  <body>
    <main class="flow">
      <section class="screen screen--expenses" id="step-3">
        <div class="phone">
          <div class="hero hero--blue">
            <div class="bubble bubble--top-left"></div>
            <div class="expense-card">
              <div class="expense-icon">🛒</div>
              <div class="expense-copy">
                <strong>Groceries</strong>
                <span>Today, 2:14 PM</span>
              </div>
              <em>- ₦3,200</em>
            </div>
            <div class="expense-card">
              <div class="expense-icon">⛽</div>
              <div class="expense-copy">
                <strong>Fuel</strong>
                <span>Today, 8:00 AM</span>
              </div>
              <em>- ₦5,000</em>
            </div>
            <div class="expense-card expense-card--muted">
              <div class="expense-icon">🍔</div>
              <div class="expense-copy">
                <strong>Lunch</strong>
                <span>Yesterday</span>
              </div>
              <em>- ₦1,500</em>
            </div>
          </div>

          <div class="content">
            <p class="eyebrow">03 of 05</p>
            <h3>Log every expense. <span>Instant</span> deduction.</h3>
            <p class="body-copy">
              Each time you spend, log it. Your safe-to-spend drops in real
              time, no surprises, no end-of-month shock.
            </p>
            <div class="footer-row">
              <div class="dots">
                <span></span>
                <span></span>
                <span class="active wide"></span>
                <span></span>
                <span></span>
              </div>
              <a class="cta-button" href="intro4.html" aria-label="Next screen">→</a>
            </div>
            <a class="skip-link" href="signup.html">Skip intro</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
