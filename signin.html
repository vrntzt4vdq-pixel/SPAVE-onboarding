<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPAVE Onboarding - Signin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="signin.js" defer></script>
  </head>
  <body>
    <main class="flow">
      <section class="screen screen--auth screen--signin" id="signin">
        <div class="phone phone--light">
          <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <form class="auth-form auth-form--signin">
            <h3>Welcome Back!</h3>
            <p class="auth-subtitle">Log in to your account</p>

            <label>
              <span>Email</span>
              <input type="email" placeholder="Enter your email" />
            </label>

            <label>
              <span>Password</span>
              <input type="password" placeholder="Enter your password" />
            </label>

            <a class="text-link" href="forgot.html">Forgot password</a>
            <button class="primary-submit" type="button">Sign In</button>

            <p class="or-divider">or</p>
            <button class="social-button" type="button">Continue with Apple</button>
            <button class="social-button" type="button">Continue with Google</button>

            <p class="auth-switch">
              Don&apos;t have an account? <a href="signup.html">Sign up</a>
            </p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
