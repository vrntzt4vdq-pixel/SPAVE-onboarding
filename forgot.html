<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPAVE Onboarding - Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="forgot.js" defer></script>
  </head>
  <body>
    <main class="flow">
      <section class="screen screen--auth screen--forgot" id="forgot">
        <div class="phone phone--light">
          <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <form class="auth-form auth-form--signin">
            <h3>Forgot Your Password</h3>
            <p class="auth-subtitle">Please enter your email</p>

            <label>
              <span>Email</span>
              <input type="email" placeholder="Enter your email" />
            </label>

            <button class="primary-submit" type="button">Reset Link</button>

            <p class="auth-switch">
              <a href="signin.html">Back to Sign in</a>
            </p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
